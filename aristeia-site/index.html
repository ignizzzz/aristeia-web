<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aristeia Admin</title>
  <style>
    :root {
      --bg: #f2f0ea;
      --card: #ffffff;
      --text: #22211f;
      --muted: #6e6a63;
      --line: #dfdbd3;
      --accent: #2d2b28;
      --accent-soft: #b39a72;
      --danger: #9a4e3f;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .wrap {
      width: min(1080px, 92vw);
      margin: 2.2rem auto;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 1.2rem;
      box-shadow: 0 8px 28px rgba(25, 20, 10, 0.06);
    }

    h1 {
      margin: 0;
      font-size: 1.2rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .muted {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .stack {
      display: grid;
      gap: 1rem;
      margin-top: 1rem;
    }

    .hidden { display: none !important; }

    label {
      display: block;
      font-size: 0.84rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0.7rem 0.8rem;
      font-size: 0.95rem;
      background: #fff;
    }

    input:focus {
      outline: none;
      border-color: var(--accent-soft);
    }

    button {
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #f4f1eb;
      border-radius: 10px;
      padding: 0.62rem 0.95rem;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
    }

    button.secondary {
      background: transparent;
      color: var(--accent);
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .notice {
      min-height: 1.2rem;
      font-size: 0.86rem;
      color: var(--muted);
    }

    .notice.error { color: var(--danger); }
    .notice.success { color: #3f7a50; }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.8rem;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0.8rem;
      background: #fff;
    }

    .metric .label {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .metric .value {
      margin-top: 0.35rem;
      font-size: 1.15rem;
      font-weight: 600;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
    }

    th, td {
      text-align: left;
      padding: 0.72rem 0.85rem;
      border-bottom: 1px solid var(--line);
      font-size: 0.9rem;
    }

    th {
      font-size: 0.74rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      background: #faf8f4;
    }

    tr:last-child td { border-bottom: 0; }

    @media (max-width: 880px) {
      .grid { grid-template-columns: 1fr; }
      th:nth-child(3), td:nth-child(3) { display: none; }
    }
  </style>
</head>
<body>
  <main class="wrap stack">
    <section class="card row">
      <div>
        <h1>Aristeia Admin</h1>
        <p class="muted">Waitlist management dashboard</p>
      </div>
      <button id="logoutBtn" class="secondary hidden" type="button">Log Out</button>
    </section>

    <section id="loginCard" class="card stack">
      <div>
        <label for="loginEmail">Admin email</label>
        <input id="loginEmail" type="email" autocomplete="email" placeholder="you@brand.com">
      </div>
      <div class="row">
        <button id="sendLinkBtn" type="button">Send Magic Link</button>
      </div>
      <p id="loginNotice" class="notice"></p>
    </section>

    <section id="dashboard" class="stack hidden">
      <section class="card stack">
        <div class="grid">
          <div class="metric">
            <div class="label">Total Signups</div>
            <div id="totalCount" class="value">0</div>
          </div>
          <div class="metric">
            <div class="label">Filtered Results</div>
            <div id="filteredCount" class="value">0</div>
          </div>
          <div class="metric">
            <div class="label">Latest Signup</div>
            <div id="latestSignup" class="value">-</div>
          </div>
        </div>
      </section>

      <section class="card stack">
        <div class="row">
          <div style="flex: 1 1 320px;">
            <label for="searchInput">Search</label>
            <input id="searchInput" type="text" placeholder="Type email or source">
          </div>
          <div class="row">
            <button id="refreshBtn" class="secondary" type="button">Refresh</button>
            <button id="exportBtn" type="button">Export CSV</button>
          </div>
        </div>
        <p id="dashboardNotice" class="notice"></p>
        <table>
          <thead>
            <tr>
              <th>Email</th>
              <th>Created At</th>
              <th>Source</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td colspan="3" class="muted">No data yet.</td>
            </tr>
          </tbody>
        </table>
      </section>
    </section>
  </main>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const loginCard = document.getElementById("loginCard");
    const dashboard = document.getElementById("dashboard");
    const loginEmail = document.getElementById("loginEmail");
    const sendLinkBtn = document.getElementById("sendLinkBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const loginNotice = document.getElementById("loginNotice");
    const dashboardNotice = document.getElementById("dashboardNotice");
    const searchInput = document.getElementById("searchInput");
    const refreshBtn = document.getElementById("refreshBtn");
    const exportBtn = document.getElementById("exportBtn");
    const tableBody = document.getElementById("tableBody");
    const totalCount = document.getElementById("totalCount");
    const filteredCount = document.getElementById("filteredCount");
    const latestSignup = document.getElementById("latestSignup");

    const state = {
      supabase: null,
      rows: [],
      filteredRows: []
    };

    function setNotice(element, message, type = "") {
      element.className = `notice${type ? ` ${type}` : ""}`;
      element.textContent = message;
    }

    function formatDate(value) {
      if (!value) return "-";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return "-";
      return d.toLocaleString();
    }

    function renderRows() {
      const rows = state.filteredRows;
      filteredCount.textContent = String(rows.length);
      latestSignup.textContent = state.rows[0] ? formatDate(state.rows[0].created_at) : "-";

      if (rows.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="3" class="muted">No matches found.</td></tr>';
        return;
      }

      tableBody.innerHTML = rows.map((row) => {
        return `
          <tr>
            <td>${row.email}</td>
            <td>${formatDate(row.created_at)}</td>
            <td>${row.source || "-"}</td>
          </tr>
        `;
      }).join("");
    }

    function applySearch() {
      const q = searchInput.value.trim().toLowerCase();
      if (!q) {
        state.filteredRows = [...state.rows];
      } else {
        state.filteredRows = state.rows.filter((row) => {
          return (row.email || "").toLowerCase().includes(q)
            || (row.source || "").toLowerCase().includes(q);
        });
      }
      renderRows();
    }

    function downloadCsv() {
      const rows = state.filteredRows;
      if (!rows.length) {
        setNotice(dashboardNotice, "There is no data to export.", "error");
        return;
      }

      const header = ["email", "created_at", "source"];
      const csvLines = [header.join(",")];
      for (const row of rows) {
        const line = [
          row.email || "",
          row.created_at || "",
          row.source || ""
        ].map((cell) => `"${String(cell).replace(/"/g, '""')}"`).join(",");
        csvLines.push(line);
      }

      const blob = new Blob([csvLines.join("\n")], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `waitlist-${new Date().toISOString().slice(0, 10)}.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      setNotice(dashboardNotice, "CSV exported.", "success");
    }

    async function loadRows() {
      setNotice(dashboardNotice, "Loading waitlist...");
      refreshBtn.disabled = true;
      exportBtn.disabled = true;

      const { data, error } = await state.supabase
        .from("aristeia_waitlist")
        .select("id,email,source,created_at")
        .order("created_at", { ascending: false })
        .limit(2000);

      refreshBtn.disabled = false;
      exportBtn.disabled = false;

      if (error) {
        setNotice(dashboardNotice, error.message || "Could not load waitlist.", "error");
        return;
      }

      state.rows = Array.isArray(data) ? data : [];
      state.filteredRows = [...state.rows];
      totalCount.textContent = String(state.rows.length);
      renderRows();
      setNotice(dashboardNotice, `Loaded ${state.rows.length} email records.`, "success");
    }

    async function ensureActiveAdmin(userId) {
      const { data, error } = await state.supabase
        .from("admin_users")
        .select("user_id,is_active")
        .eq("user_id", userId)
        .single();

      if (error || !data || data.is_active !== true) {
        return false;
      }
      return true;
    }

    async function showDashboard() {
      loginCard.classList.add("hidden");
      dashboard.classList.remove("hidden");
      logoutBtn.classList.remove("hidden");
      await loadRows();
    }

    async function showLogin(message = "") {
      dashboard.classList.add("hidden");
      logoutBtn.classList.add("hidden");
      loginCard.classList.remove("hidden");
      if (message) {
        setNotice(loginNotice, message, "error");
      }
    }

    async function initClient() {
      const response = await fetch("/api/admin-config");
      const config = await response.json().catch(() => ({}));
      if (!response.ok || !config.ok) {
        throw new Error(config.error || "Admin config is not available.");
      }

      state.supabase = createClient(config.supabaseUrl, config.supabaseAnonKey, {
        auth: {
          persistSession: true,
          autoRefreshToken: true
        }
      });
    }

    async function initAuthFlow() {
      const { data: authData } = await state.supabase.auth.getSession();
      const session = authData.session;

      if (!session || !session.user) {
        await showLogin();
        return;
      }

      const allowed = await ensureActiveAdmin(session.user.id);
      if (!allowed) {
        await state.supabase.auth.signOut();
        await showLogin("Your account is not authorized for admin access.");
        return;
      }

      await showDashboard();
    }

    sendLinkBtn.addEventListener("click", async () => {
      const email = loginEmail.value.trim().toLowerCase();
      if (!email || !email.includes("@")) {
        setNotice(loginNotice, "Enter a valid admin email.", "error");
        return;
      }

      sendLinkBtn.disabled = true;
      setNotice(loginNotice, "Sending magic link...");
      const { error } = await state.supabase.auth.signInWithOtp({
        email,
        options: {
          emailRedirectTo: `${window.location.origin}/admin/`
        }
      });
      sendLinkBtn.disabled = false;

      if (error) {
        setNotice(loginNotice, error.message || "Could not send magic link.", "error");
        return;
      }

      setNotice(loginNotice, "Magic link sent. Check your inbox.", "success");
    });

    logoutBtn.addEventListener("click", async () => {
      await state.supabase.auth.signOut();
      await showLogin();
      setNotice(loginNotice, "You are logged out.", "success");
    });

    refreshBtn.addEventListener("click", loadRows);
    exportBtn.addEventListener("click", downloadCsv);
    searchInput.addEventListener("input", applySearch);

    try {
      await initClient();
      await initAuthFlow();
      state.supabase.auth.onAuthStateChange(async (event) => {
        if (event === "SIGNED_IN") {
          await initAuthFlow();
        }
        if (event === "SIGNED_OUT") {
          await showLogin();
        }
      });
    } catch (error) {
      setNotice(loginNotice, error.message || "Admin is not configured yet.", "error");
      await showLogin();
    }
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
